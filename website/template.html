<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NEWZYX: </title>
<link rel="icon" href="NewzyxV2Favicon.ico" type="image/x-icon">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0eb;
    color: #1a1a1a;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.75;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 0 24px;
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    height: 70px;
    gap: 16px;
  }

  .logo { height: 42px; width: 42px; filter: brightness(1.2); }

  .masthead {
    display: flex;
    flex-direction: column;
  }

  .masthead-title {
    font-family: Georgia, serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }

  .masthead-tagline {
    font-family: -apple-system, sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #29abe2;
    margin-top: -2px;
  }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .edition-date {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: #999;
    text-align: right;
    line-height: 1.3;
    position: relative;
    cursor: pointer;
    padding: 6px 10px;
    border: 1px solid #333;
    border-radius: 4px;
  }

  .edition-date input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    -webkit-appearance: none;
  }

  .edition-date:active input,
  .edition-date:focus-within input {
    opacity: 1; position: static; width: auto; height: auto;
    background: #222; color: #ccc; border: none; font-size: 13px;
    font-family: -apple-system, sans-serif; padding: 2px 4px; border-radius: 3px;
  }

  .ticker {
    background: #29abe2;
    padding: 8px 24px;
    text-align: center;
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .player-section {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 24px 0;
  }

  .player-box {
    background: #fff;
    border: 2px solid #1a1a1a;
    border-radius: 4px;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .listen-badge {
    background: #1a1a1a;
    color: #fff;
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 6px 14px;
    border-radius: 3px;
    white-space: nowrap;
  }

  audio { width: 100%; height: 40px; }
  audio::-webkit-media-controls-panel { background: #fafaf5; }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .lead-story {
    border-bottom: 3px double #ccc;
    padding-bottom: 32px;
    margin-bottom: 32px;
  }

  .lead-story .article-title {
    font-size: 28px;
    line-height: 1.25;
    margin-bottom: 14px;
  }

  .lead-story .article-summary { font-size: 17px; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .two-col .article {
    padding: 24px;
    border-bottom: 1px solid #ddd;
  }

  .two-col .article:nth-child(odd) { border-right: 1px solid #ddd; }

  .article-title {
    font-size: 19px;
    font-weight: 700;
    color: #111;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .article-summary {
    color: #444;
    font-size: 14.5px;
    margin-bottom: 12px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6;
  }

  .article-meta {
    font-family: -apple-system, sans-serif;
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .article-meta a {
    color: #1a1a1a;
    text-decoration: none;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 11px;
  }

  .article-meta a:hover { color: #29abe2; }

  .score-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .score-dot.high { background: #22c55e; }
  .score-dot.mid { background: #eab308; }

  .latest-btn {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #fff;
    background: #29abe2;
    padding: 6px 14px;
    border-radius: 4px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .latest-btn:hover { background: #1a8fc0; }

  .theme-toggle {
    background: none;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1;
    color: #999;
    transition: border-color 0.3s;
  }
  .theme-toggle:hover { border-color: #29abe2; }

  body.dark { background: #141414; color: #d4d4d4; }
  body.dark header { background: #0a0a0a; }
  body.dark .ticker { background: #1a6d8e; }
  body.dark .listen-badge { background: #29abe2; color: #000; }
  body.dark audio { filter: invert(1) hue-rotate(180deg); }
  body.dark .player-box { background: #1a1a1a; border-color: #333; }
  body.dark .lead-story { border-bottom-color: #333; }
  body.dark .article-title { color: #eee; }
  body.dark .article-summary { color: #999; }
  body.dark .article-meta { color: #666; }
  body.dark .article-meta a { color: #ccc; }
  body.dark .article-meta a:hover { color: #29abe2; }
  body.dark .two-col .article { border-bottom-color: #2a2a2a; }
  body.dark .two-col .article:nth-child(odd) { border-right-color: #2a2a2a; }
  body.dark .edition-date { border-color: #444; color: #777; }
  body.dark .theme-toggle { border-color: #555; color: #777; }

  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
    .two-col .article:nth-child(odd) { border-right: none; }
    .lead-story .article-title { font-size: 22px; }
    .masthead-title { font-size: 20px; }
    .player-box { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body class="dark" data-episode="">

<header>
  <div class="header-inner">
    <a href="index.html"><img src="NewzyxV2-removebg.png" class="logo" alt="Newzyx V2"></a>
    <div class="masthead">
      <div class="masthead-title">NEWZYX <span style="font-size:13px; font-weight:400; letter-spacing:1px; color:#29abe2; vertical-align:middle;">v2</span></div>
      <div class="masthead-tagline">The Daily Digest for Kids</div>
    </div>
    <div class="header-right">
      <a id="latestBtn" class="latest-btn" href="index.html">Latest</a>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">&#9790;</button>
      <div class="edition-date" onclick="document.getElementById('dtInput').showPicker?.()">
        Browse<br>Archive
        <input id="dtInput" type="date" min="2025-09-09">
      </div>
    </div>
  </div>
</header>

<div class="ticker" id="tickerBar"></div>

<div class="player-section">
  <div class="player-box">
    <div class="listen-badge">Listen Now</div>
    <audio controls src="today.mp3">Your browser does not support the audio element.</audio>
  </div>
</div>

<main>
  <div id="lead"></div>
  <div class="two-col" id="articles"></div>
</main>

<script>
  const dtInput = document.getElementById('dtInput');
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);

  dtInput.addEventListener('change', () => { if (!isIOS) onDatePicked(); }, { passive: true });
  dtInput.addEventListener('blur', () => { if (isIOS) onDatePicked(); }, { passive: true });

  function localISODate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  (function initDateInputBounds() {
    const today = localISODate(new Date());
    dtInput.max = today;
  })();

  function onDatePicked() {
    if (!dtInput.value) return;
    const today = localISODate(new Date());
    if (dtInput.value <= today && dtInput.value >= '2025-09-09')
      window.location.href = dtInput.value + '.html';
  }

  (function setTicker() {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const iso = document.body.getAttribute('data-episode');
    let y, m, day;
    if (iso && /^\d{4}-\d{2}-\d{2}$/.test(iso)) {
      const p = iso.split('-');
      y = parseInt(p[0], 10);
      m = parseInt(p[1], 10) - 1;
      day = parseInt(p[2], 10);
    } else {
      const t = document.title.replace('NEWZYX: ', '').trim();
      if (!t) return;
      const d = new Date(t);
      if (isNaN(d.getTime())) return;
      y = d.getFullYear();
      m = d.getMonth();
      day = d.getDate();
    }
    const wd = new Date(y, m, day).getDay();
    document.getElementById('tickerBar').textContent =
      days[wd] + ' Edition \u2014 ' + months[m] + ' ' + day + ', ' + y;
  })();

  function displayArticles() {
    const el = document.getElementById('articleData');
    let articles;
    try { articles = el ? JSON.parse(el.textContent) : null; } catch(e) { articles = null; }
    const leadContainer = document.getElementById('lead');
    const gridContainer = document.getElementById('articles');

    if (!articles || articles.length === 0) {
      document.querySelector('.player-box').style.display = 'none';
      document.getElementById('tickerBar').textContent = 'NO EPISODE AVAILABLE';
      leadContainer.innerHTML = `
        <div style="text-align:center; padding:60px 20px;">
          <div style="font-size:48px; margin-bottom:16px;">&#128240;</div>
          <div class="article-title" style="font-size:24px; margin-bottom:12px;">No Episode for This Date</div>
          <div class="article-summary" style="max-width:420px; margin:0 auto 24px;">
            There was no podcast published on this day. Try picking another date from the archive or jump to the latest episode.
          </div>
          <a href="index.html" class="latest-btn" style="display:inline-block; padding:10px 24px; font-size:13px;">Latest News</a>
        </div>`;
      return;
    }

    articles.forEach((a, i) => {
      const scoreNum = parseInt(a.score);
      const dotClass = scoreNum >= 90 ? 'high' : 'mid';

      if (i === 0) {
        const div = document.createElement('div');
        div.className = 'lead-story';
        div.innerHTML = `
          <div class="article-title">${a.title}</div>
          <div class="article-summary">${a.summary}</div>
          <div class="article-meta">
            <a href="${a.url}" target="_blank">${a.source}</a>
            <span>${a.dt}</span>
            <span><span class="score-dot ${dotClass}"></span>${a.score}% relevance</span>
          </div>
        `;
        leadContainer.appendChild(div);
      } else {
        const div = document.createElement('div');
        div.className = 'article';
        div.innerHTML = `
          <div class="article-title">${a.title}</div>
          <div class="article-summary">${a.summary}</div>
          <div class="article-meta">
            <a href="${a.url}" target="_blank">${a.source}</a>
            <span>${a.dt}</span>
            <span><span class="score-dot ${dotClass}"></span>${a.score}%</span>
          </div>
        `;
        gridContainer.appendChild(div);
      }
    });
  }
  displayArticles();

  const themeToggle = document.getElementById('themeToggle');
  if (localStorage.getItem('theme') === 'light') document.body.classList.remove('dark');
  updateToggleIcon();

  themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    updateToggleIcon();
  });

  function updateToggleIcon() {
    themeToggle.innerHTML = document.body.classList.contains('dark') ? '&#9788;' : '&#9790;';
  }
</script>
</body>
</html>
